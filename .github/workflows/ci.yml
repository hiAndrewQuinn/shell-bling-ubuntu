name: ci

on:
  push:
    branches: [main, rewrite-single-script-multi-distro]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pre-commit
      - run: pre-commit run --all-files

  docker-matrix:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu-22.04
          - ubuntu-24.04
          - ubuntu-26.04
          - debian-12
          - debian-13
    steps:
      - uses: actions/checkout@v4
      - name: build + smoke-test ${{ matrix.distro }}
        run: make test-${{ matrix.distro }}

  docker-matrix-arm64:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu-24.04
          - debian-13
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: arm64 build ${{ matrix.distro }}
        run: |
          docker buildx build --platform linux/arm64 \
            -f docker/${{ matrix.distro }}.Dockerfile \
            -t shell-bling-test-${{ matrix.distro }}:arm64 \
            --load .
          docker run --rm --platform linux/arm64 \
            shell-bling-test-${{ matrix.distro }}:arm64
